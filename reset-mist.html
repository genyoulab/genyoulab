<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reset Mist - GenYou Lab</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./src/styles/tokens.css">
  <link rel="stylesheet" href="./src/styles/typography.css">
  <link rel="stylesheet" href="./src/styles/pdp.css">

  <meta property="og:title" content="GenYou Lab — 피부가 쉴 시간을 돌려드립니다">
  <meta property="og:description" content="내버려 두는 것의 미학. 젠유랩과 함께 피부가 쉴 시간을 돌려드립니다.">
  <meta property="og:image" content="/assets/og-image.png">
  <meta property="og:type" content="website">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DVR7NZR8MW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DVR7NZR8MW');
  </script>
</head>
<body>
  <header class="glassmorphism" style="position: sticky; top: 0; z-index: 100; padding: 16px 0;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="text-h3" style="color: var(--color-primary); text-decoration: none;">GenYou Lab</a>
      <div style="display: flex; gap: 16px; align-items: center;">
        <a href="brand.html" class="text-body" style="color: var(--color-text-primary); text-decoration: none;">Brand & Community</a>
        <a href="career.html" class="text-body" style="color: var(--color-text-primary); text-decoration: none;">Career</a>
        <button class="text-btn-secondary" style="background: none; border: none; color: var(--color-primary); cursor:pointer;">진단하기</button>
        <svg class="icon-body" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor"/></svg>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-section" id="hero-buy-section" style="min-height: 80vh; padding: 60px 0; display: flex; flex-direction: column; justify-content: center;">
      <div class="container grid-hero">
        <div class="hero-image neumorphism radius-card" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
          <p>Reset Mist Image</p>
        </div>
        <div class="hero-info" style="display: flex; flex-direction: column; justify-content: center;">
          <h2 class="text-h1" style="margin-bottom: 8px;">Reset Mist</h2>
          <p class="text-body" style="color: var(--color-text-secondary); margin-bottom: 24px;">브랜드 철학이 담긴 스킨케어</p>
          <div style="margin-top: auto;">
            <p class="text-h2" style="margin-bottom: 16px;">24,000원</p>
            <button class="btn-buy-naver radius-btn text-btn-primary" aria-label="네이버 스마트스토어에서 Reset Mist 구매하기" onclick="window.goToSmartStore('reset-mist')" style="width: 100%; padding: 16px; font-weight: 600;">
              <svg class="n-icon" viewBox="0 0 24 24"><path d="M16.3 3H21v18h-4.7l-6.6-9.1V21H5V3h4.7l6.6 9.1V3z" fill="currentColor"/></svg>
              네이버에서 구매하기
            </button>
          </div>
        </div>
      </div>
    </section>

    <section class="container" style="padding: 60px 0;">
      <h3 class="text-h2" style="margin-bottom: 24px;">주요 성분</h3>
      <div class="ingredient-layer neumorphism radius-card" style="padding: 24px; cursor: pointer;">
        <div class="ingredient-header" style="display: flex; justify-content: space-between; align-items: center;">
          <span class="text-h3">핵심 성분</span>
          <svg class="icon-body" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
        <div class="ingredient-details" style="display: none; margin-top: 16px; color: var(--color-text-secondary);">
          <p class="text-body">피부 진정과 장벽 강화에 도움을 주는 천연 추출물입니다.</p>
        </div>
      </div>
    </section>

    <section class="container" style="padding: 60px 0;">
      <div id="diagnosis-widget"></div>
    </section>
  </main>

  <div class="floating-bar glassmorphism" id="mobile-floating-bar">
    <div>
      <p class="text-floating-product" style="font-size:12px; font-weight:400; margin-bottom:2px;">Reset Mist</p>
      <p class="text-floating-price" style="font-size:16px; font-weight:500;">24,000원</p>
    </div>
    <button class="btn-buy-naver radius-btn text-btn-primary" aria-label="네이버 스마트스토어에서 Reset Mist 구매하기" onclick="window.goToSmartStore('reset-mist')" style="padding: 12px 24px;">
      구매하기
    </button>
  </div>

  <!-- Firebase SDK (v8 compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <!-- Kakao SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
  <!-- Naver SDK -->
  <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js"></script>
  
  <script src="./src/config/auth.js" type="module"></script>
  <script src="./src/config/smartstore.js" type="module"></script>
  <script src="./src/scripts/pdp.js" type="module"></script>
  <script src="./src/scripts/diagnosis.js" type="module"></script>
</body>
</html>
