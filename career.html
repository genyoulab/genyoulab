  <meta property="og:description" content="내버려 두는 것의 미학. 젠유랩과 함께 피부가 쉴 시간을 돌려드립니다.">
  <meta property="og:image" content="/assets/og-image.png">
  <meta property="og:type" content="website">

<body>
  <header class="glassmorphism" style="position: sticky; top: 0; z-index: 100; padding: 16px 0;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="text-h3" style="color: var(--color-primary); text-decoration: none;">GenYou Lab</a>
      <div style="display: flex; gap: 16px; align-items: center;">
        <a href="brand.html" class="text-body" style="color: var(--color-text-primary); text-decoration: none;">Brand & Community</a>
        <a href="career.html" class="text-body" style="color: var(--color-text-primary); text-decoration: none;">Career</a>
        <svg class="icon-body" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor"/></svg>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-section" style="padding: 100px 0; text-align: center;">
      <div class="container">
        <h1 class="text-h1" style="color: var(--color-primary); margin-bottom: 24px;">비워내는 과정에 동참할 사람</h1>
        <p class="text-body" style="color: var(--color-text-secondary); max-width: 600px; margin: 0 auto 60px auto; line-height: 1.8;">
          더 많은 성분을 채워넣는 것이 능사라고 믿는 세상에서,<br>
          우리는 피부가 쉴 수 있도록 최소한의 성분만을 남깁니다.<br>
          진정한 아름다움은 '내버려 두는 것의 미학'에서 시작된다고 믿는 당신을 기다립니다.
        </p>
      </div>
    </section>

    <section class="container" style="padding: 40px 0 80px 0; max-width: 800px;">
      <div class="neumorphism radius-card" style="padding: 40px; text-align: center;">
        <h2 class="text-h2" style="color: var(--color-primary); margin-bottom: 24px;">현재 열려있는 포지션</h2>
        <p class="text-body" style="color: var(--color-text-secondary); margin-bottom: 32px;">
          현재 적극적으로 채용 중인 포지션이 없습니다.<br>
          하지만 우리의 철학에 공감하고 함께하고 싶으시다면 언제든 이력서를 남겨주세요.
        </p>
        <button class="radius-btn text-btn-secondary neumorphism" style="background: var(--color-surface); padding: 12px 32px; border: 1px solid var(--color-muted); color: var(--color-primary); cursor: pointer;">
          인재풀 등록하기
        </button>
      </div>
    </section>
  </main>
